name: Deploy IMD Weather App

on:

  push:

    branches:

      - main

  workflow_dispatch:

env:

  CLUSTER_NAME: kind

  NAMESPACE: imd-weather

jobs:

  deploy:

    runs-on: self-hosted

    defaults:

      run:

        shell: powershell

    steps:

      - uses: actions/checkout@v4

      - name: Verify tools

        run: |

          docker --version

          kind version

          kubectl version --client

      - name: Build API image

        run: |

          docker build `
            -f Dockerfile.api `
            -t imd-weather-api:${{ github.sha }} `
            .

      - name: Build UI image

        run: |

          docker build `
            -f Dockerfile.ui `
            -t imd-weather-ui:${{ github.sha }} `
            .

      - name: Load images

        run: |

          kind load docker-image `
            imd-weather-api:${{ github.sha }} `
            --name $env:CLUSTER_NAME

          kind load docker-image `
            imd-weather-ui:${{ github.sha }} `
            --name $env:CLUSTER_NAME

      - name: Deploy app

        env:

          JWT_SECRET: ${{ secrets.JWT_SECRET }}

        run: |

          kubectl apply `
            -f k8s/00-namespace.yaml

          if ($env:JWT_SECRET) {

            $secret=$env:JWT_SECRET

          }

          else {

            $secret="change-this-secret"

          }

          kubectl -n $env:NAMESPACE create secret generic imd-weather-app-secret `
            --from-literal=jwt-secret=$secret `
            --dry-run=client `
            -o yaml | kubectl apply -f -

          kubectl apply `
            -f k8s/10-api.yaml

          kubectl apply `
            -f k8s/20-ui.yaml

          kubectl -n $env:NAMESPACE `
            set image deployment/imd-weather-api `
            api=imd-weather-api:${{ github.sha }}

          kubectl -n $env:NAMESPACE `
            set image deployment/imd-weather-ui `
            ui=imd-weather-ui:${{ github.sha }}

          kubectl -n $env:NAMESPACE `
            rollout status deployment/imd-weather-api `
            --timeout=300s

          kubectl -n $env:NAMESPACE `
            rollout status deployment/imd-weather-ui `
            --timeout=300s

      - name: Verify ML connection

        run: |

          kubectl -n $env:NAMESPACE exec deploy/imd-weather-api -- `
          python -c "import requests;payload={'state':'Delhi','district':'New Delhi','target_date':'2026-11-15'};r=requests.post('http://imd-weather-ml:8000/forecast',json=payload,timeout=30);print(r.status_code);print(r.text);r.raise_for_status()"

      - name: Verify deployments

        run: |

          kubectl -n $env:NAMESPACE get deployments

          kubectl -n $env:NAMESPACE get pods

          kubectl -n $env:NAMESPACE get svc
